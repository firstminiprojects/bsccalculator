<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>BSC Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/style.css">
<script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
<script src="./js/script.js" defer></script>
</head>
<body>
<div class="calculator-card" id="calculatorCard">
<div class="slider-viewport">
<div class="slider-track" id="sliderTrack">

<div class="slide slide-input" id="slide1Inputs">
  <div class="header-section">
      <div class="header-top-row">
          <div class="brand-badge">Operational Excellence</div>
      </div>
      <h2 class="title-with-icon">
          <i data-lucide="bar-chart-2" class="icon-title"></i>
          <span>Balanced Scorecard</span>
      </h2>
      <p class="subtitle">Agent evaluation matrix and performance intelligence</p>
      
      <div class="header-controls-row">
          <div class="metrics-note">
              <i data-lucide="info" class="icon-inline"></i>
              <span>Automatic 20% attendance credit applied to total</span>
          </div>
          <div class="toggle-accessibility-container">
              <label class="switch-control" for="colorBlindToggle">
                  <input type="checkbox" id="colorBlindToggle">
                  <span class="switch-slider"></span>
              </label>
              <span class="switch-label">Color Blind Mode</span>
          </div>
      </div>
  </div>

  <div style="position: relative;" id="alertHostContainer"></div>

  <div class="form-container">
      <div class="input-group">
          <label for="fcrInput">
              <span class="label-text">
                  <i data-lucide="refresh-cw" class="icon-label"></i> First Call Resolution
              </span> 
              <span class="goal-tag">Goal: 68%</span>
          </label>
          <div class="input-wrapper">
              <input type="number" id="fcrInput" placeholder="68" min="0" max="100">
              <span class="unit-indicator">%</span>
          </div>
      </div>

      <div class="input-group">
          <label for="crsInput">
              <span class="label-text">
                  <i data-lucide="smile" class="icon-label"></i> Customer Satisfaction
              </span> 
              <span class="goal-tag">Goal: 85%</span>
          </label>
          <div class="input-wrapper">
              <input type="number" id="crsInput" placeholder="85" min="0" max="100">
              <span class="unit-indicator">%</span>
          </div>
      </div>

      <div class="input-group">
          <label for="ahtInput">
              <span class="label-text">
                  <i data-lucide="clock" class="icon-label"></i> Average Handle Time
              </span> 
              <span class="goal-tag">Goal: 14m</span>
          </label>
          <div class="input-wrapper">
              <input type="number" id="ahtInput" placeholder="14" min="1">
              <span class="unit-indicator">min</span>
          </div>
      </div>

      <div class="input-group">
          <label for="qaInput">
              <span class="label-text">
                  <i data-lucide="file-check" class="icon-label"></i> Quality Assurance
              </span> 
              <span class="goal-tag">Goal: 80%</span>
          </label>
          <div class="input-wrapper">
              <input type="number" id="qaInput" placeholder="80" min="0" max="100">
              <span class="unit-indicator">%</span>
          </div>
      </div>
  </div>

  <div class="button-group">
      <button id="bscBtn" class="btn-primary">Generate Report</button>
      <button id="clearBtn" class="btn-secondary">Reset Inputs</button>
  </div>
</div>

<div class="slide slide-summary" id="resultContainer">
  <div class="result-toggle-header">
      <div class="toggle-header-left">
          <i data-lucide="bar-chart-2" class="toggle-arrow-icon"></i>
          <h3>Executive Evaluation Summary</h3>
      </div>
      <div class="status-badge-wrapper"></div>
  </div>

  <div class="collapsible-content" id="collapsibleContent">
      <div class="score-display-card" id="summaryDisplayCard">
          <div class="donut-chart-wrapper">
              <svg class="donut-chart-svg" viewBox="0 0 220 220">
                  <circle class="donut-bg" cx="110" cy="110" r="92"></circle>
                  <circle class="donut-fill" id="progressFillCircle" cx="110" cy="110" r="92"></circle>
              </svg>
              <div class="donut-center-text" id="centerTextWrapper">
                  <span id="totalBSC">0.00%</span>
                  <span class="donut-label">Overall Score</span>
                  <div id="gaugeBadgeContainer" class="gauge-badge-container"></div>
              </div>
          </div>

          <div class="metrics-legend-container">
              <div class="legend-header">
                  <span>Metric breakdown</span>
                  <span id="legendTotalValue">Weighted Points</span>
              </div>
              <div id="metricsLegendList" class="metrics-legend-list"></div>
          </div>
      </div>

      <div id="standaloneDirectiveArea" class="standalone-directive-area"></div>

      <div class="achievement-message" id="achievementMessage"></div>

      <div class="bottom-action-wrapper">
          <button id="bottomCollapseBtn" class="btn-collapse-summary">
              <i data-lucide="arrow-left" class="icon-inline"></i>
              <span>Go Back & Edit</span>
          </button>
      </div>
  </div>
</div>

<div class="slide slide-tips" id="tipsSlide">
  <div class="result-toggle-header">
      <div class="toggle-header-left">
          <i data-lucide="lightbulb" class="toggle-arrow-icon" style="color: #ea580c;"></i>
          <h3>Performance Intelligence</h3>
      </div>
      <div class="status-badge-wrapper">
          <span class="status-badge" style="background: #fff7ed; color: #c2410c; border-color: #ffedd5;">Directives</span>
      </div>
  </div>

  <div id="performanceTips" class="performance-tips-container-standalone"></div>

  <div class="bottom-action-wrapper" style="margin-top: 1.5rem;">
      <button id="tipsBackBtn" class="btn-collapse-summary">
          <i data-lucide="arrow-left" class="icon-inline"></i>
          <span>Return to Summary</span>
      </button>
  </div>
</div>

</div>
</div>
</div>
</body>
</html>
